<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Endless Terminals — Explorer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/asciinema-player@3.7.1/dist/bundle/asciinema-player.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark-dimmed.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
              mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular'],
            },
            colors: {
              ink: { 50:'#f7f8fa', 100:'#eef0f4', 200:'#dde1ea', 300:'#b8c0d2', 400:'#8b95ad', 500:'#5e6a86', 600:'#43506b', 700:'#2f3a51', 800:'#1f293c', 900:'#131a2c', 950:'#0a0f1d' },
              accent: { 50:'#ecfdf5', 500:'#10b981', 600:'#059669', 700:'#047857' },
              warn: { 500:'#f59e0b', 600:'#d97706' },
              danger: { 500:'#ef4444', 600:'#dc2626' },
            }
          }
        }
      }
    </script>
</head>
<body class="bg-ink-950 text-ink-100 font-sans antialiased min-h-screen">
    <header class="border-b border-ink-800 bg-ink-900/80 backdrop-blur sticky top-0 z-30">
        <div class="max-w-7xl mx-auto flex items-center gap-6 px-6 h-14">
            <a href="{{ url_for('index') }}" class="flex items-center gap-2 font-semibold tracking-tight">
                <span class="inline-flex items-center justify-center w-7 h-7 rounded bg-gradient-to-br from-accent-500 to-accent-700 text-ink-950 font-bold">▌</span>
                <span>Endless Terminals</span>
                <span class="text-ink-400 font-normal">/ Explorer</span>
            </a>
            <nav class="ml-auto flex items-center gap-1 text-sm">
                {% set p = request.path %}
                <a href="{{ url_for('index') }}" class="px-3 py-1.5 rounded {% if p == '/' %}bg-ink-800 text-white{% else %}text-ink-300 hover:bg-ink-800/70 hover:text-white{% endif %}">Dashboard</a>
                <a href="{{ url_for('runs_index') }}" class="px-3 py-1.5 rounded {% if p.startswith('/runs') %}bg-ink-800 text-white{% else %}text-ink-300 hover:bg-ink-800/70 hover:text-white{% endif %}">Runs</a>
                <a href="{{ url_for('tasks_index') }}" class="px-3 py-1.5 rounded {% if p.startswith('/tasks') %}bg-ink-800 text-white{% else %}text-ink-300 hover:bg-ink-800/70 hover:text-white{% endif %}">Tasks</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-7xl mx-auto px-6 py-10 text-xs text-ink-500">
        <div class="flex items-center gap-3">
            <span>Reads <code class="text-ink-300">harbor_tasks/</code> + <code class="text-ink-300">solution_sonnet/</code> on disk.</span>
            <span class="ml-auto opacity-60">no telemetry · all local</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.7.1/dist/bundle/asciinema-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@13.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/dockerfile.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/languages/markdown.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
